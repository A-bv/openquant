        q(root,'bseg').style.width=(vu/mx*100)+'%'; q(root,'sseg').style.width=(sh/mx*100)+'%';
        q(root,'blab').textContent='business $1,000M'; q(root,'slab').textContent='tax break '+money(sh)+'M';
        K(q(root,'fnum'),'1000 + 0.21\\times'+v.debt+' = '+Math.round(apv));}},

    distress:{ch:'H3 · financing',eyebrow:'how much debt is healthy',idea:'Too much debt costs more than it saves.',
      usecase:"Finding a sensible debt level. The tax break grows with debt, but so does the risk of trouble, and faster. Past a point, more debt destroys value instead of adding it.",
      fixed:"on a $1,000M firm", src:'Berk-DeMarzo Ch.16',
      inputs:[{k:'d',label:'share funded by debt',min:0,max:80,step:5,val:35,unit:'%'}],
      viz:hbar('ben','var(--good)','value the tax break adds')+hbar('cost','var(--lost)','expected cost of trouble'),
      fgen:"\\text{net} \\;=\\; \\underbrace{\\text{tax break}}_{\\text{rises}} - \\underbrace{\\text{distress cost}}_{\\text{rises faster}}",
      explain:'The tax break rises steadily with debt, but the cost of possible trouble rises much faster. The best debt level is where the gap between them is widest.',
      update:function(v,root){var f=v.d/100, ben=210*f, cost=400*f*f, net=ben-cost, mx=Math.max(ben,cost,1);
        q(root,'ans').textContent=(net>=0?'+':'')+money(net)+'M'; var c=q(root,'chip'); c.className='chip '+(net>=0?'good':'lost'); c.textContent=net>=0?'debt still helps':'too much debt';
        q(root,'note').textContent='at '+v.d+'% debt the tax break adds '+money(ben)+'M but trouble costs '+money(cost)+'M';
        q(root,'benval').textContent=money(ben)+'M'; q(root,'costval').textContent=money(cost)+'M';
        q(root,'benbar').style.width=(ben/mx*100)+'%'; q(root,'costbar').style.width=(cost/mx*100)+'%';
        K(q(root,'fnum'),Math.round(ben)+' - '+Math.round(cost)+' = '+(net>=0?'+':'')+Math.round(net));}}
,

    fwdfut:{ch:'H4 · derivatives',eyebrow:'lock a price today',idea:'A forward locks the price of a future trade right now.',
      usecase:"A farmer, an airline, or an importer who knows they will buy or sell later and wants no surprises. A forward fixes the price today; whatever the market does, the deal is set.",
      fixed:"you agreed to buy at $100", src:'Berk-DeMarzo Ch.20',
      inputs:[{k:'s',label:'the market price when the deal settles',min:60,max:140,step:2,val:115,unit:'$'}],
      viz:twoBarHTML('your locked price','the market price'),
      fgen:"\\text{gain} \\;=\\; \\text{market price} - \\text{locked price}",
      explain:'Lock at $100 and you gain if the market ends higher, lose if it ends lower. A futures contract is the same idea, but traded on an exchange and settled daily.',
      update:function(v,root){var pay=v.s-100, mx=Math.max(v.s,100);
        q(root,'ans').textContent=(pay>=0?'+':'')+money(pay); var c=q(root,'chip'); c.className='chip '+(pay>=0?'good':'lost'); c.textContent=pay>=0?'the lock paid off':'you locked too high';
        q(root,'note').textContent='locked at $100, the market at '+money(v.s)+', so you are '+(pay>=0?'ahead ':'behind ')+money(Math.abs(pay));
        q(root,'av').textContent='$100'; q(root,'bv').textContent=money(v.s);
        q(root,'abar').style.height=(100/mx*144)+'px'; q(root,'bbar').style.height=(v.s/mx*144)+'px'; q(root,'bbar').style.background=pay>=0?'var(--good)':'var(--lost)';
        K(q(root,'fnum'),money(v.s).replace('$','')+' - 100 = '+(pay>=0?'+':'')+pay);}},

    fwdprice:{ch:'H4 · derivatives',eyebrow:'the fair forward price',idea:'The fair price to lock in is today’s price plus the cost of waiting.',
      usecase:"Setting the delivery price in a forward so neither side gets a free lunch. It is just today’s price grown at the interest rate over the wait.",
      fixed:"delivery in 1 year", src:'Berk-DeMarzo Ch.20',
      inputs:[{k:'s',label:'the price today',min:50,max:150,step:5,val:100,unit:'$'},{k:'r',label:'the interest rate',min:0,max:10,step:0.5,val:4,unit:'%'}],
      viz:twoBarHTML('price today','fair forward price'),
      fgen:"\\text{forward} \\;=\\; \\text{today} \\times (1+r)^{T}",
      explain:'Buying now and holding costs you the interest you give up, so the fair future price is today’s price plus that carry. Any other price lets someone arbitrage you.',
      update:function(v,root){var f=v.s*(1+v.r/100), mx=f;
        q(root,'ans').textContent=money(f); var c=q(root,'chip'); c.className='chip info'; c.textContent='+'+money(f-v.s)+' of carry';
        q(root,'note').textContent=money(v.s)+' today grows to a fair forward price of '+money(f);
        q(root,'av').textContent=money(v.s); q(root,'bv').textContent=money(f);
        q(root,'abar').style.height=(v.s/mx*144)+'px'; q(root,'bbar').style.height='144px';
        K(q(root,'fnum'),v.s+'\\times(1+'+(v.r/100).toFixed(3)+') = '+f.toFixed(2));}},

    swap:{ch:'H4 · derivatives',eyebrow:'trade floating for fixed',idea:'A swap turns an unpredictable rate into a fixed one.',
      usecase:"A borrower with a variable-rate loan who wants to stop worrying about rate moves. A swap exchanges the floating rate for a fixed one, the price of sleeping at night.",
      fixed:"you swapped to a fixed 3.2%", src:'Berk-DeMarzo Ch.20',
      inputs:[{k:'fl',label:'where the floating rate ends up',min:1,max:7,step:0.25,val:4,unit:'%',lo:'rates fall',hi:'rates rise'}],
      viz:hbar('flo','var(--track)','what you would have paid floating')+hbar('fix','var(--accent)','what you actually pay (fixed)'),
      fgen:"\\text{you pay fixed} \\;\\text{instead of}\\; \\text{floating}",
      explain:'You give up the chance of cheaper payments if rates fall, in exchange for certainty if they rise. The swap removes the surprise either way.',
      update:function(v,root){var fix=3.2, save=v.fl-fix, mx=Math.max(v.fl,fix);
        q(root,'ans').textContent='fixed at 3.2%'; var c=q(root,'chip'); c.className='chip '+(save>=0?'good':'lost'); c.textContent=save>=0?'the swap saved you '+save.toFixed(1)+'%':'you paid '+(-save).toFixed(1)+'% for certainty';
        q(root,'note').textContent='floating would cost '+v.fl+'%, your fixed rate is 3.2%';
        q(root,'floval').textContent=v.fl+'%'; q(root,'fixval').textContent='3.2%';
        q(root,'flobar').style.width=(v.fl/mx*100)+'%'; q(root,'flobar').style.background='var(--faint)'; q(root,'fixbar').style.width=(fix/mx*100)+'%';
        K(q(root,'fnum'),'\\text{floating }'+v.fl+'\\% \\to \\text{fixed }3.2\\%');}},

    optpayoff:{ch:'H4 · derivatives',eyebrow:'options',idea:'An option is the right, not the duty, to trade at a set price.',
      usecase:"Betting on a rise with limited downside, or protecting a holding from a fall. A call lets you buy at a set price; you only use it if it helps, and lose only what you paid.",
      fixed:"a call to buy at $100, costing $5", src:'Berk-DeMarzo Ch.20',
      inputs:[{k:'s',label:'the stock price at expiry',min:50,max:150,step:2,val:115,unit:'$'}],
      viz:'<svg data-r="svg" viewBox="0 0 320 170" width="100%" style="max-width:340px;display:block;margin:0 auto;"></svg>',
      fgen:"\\text{call profit} \\;=\\; \\max(\\text{stock}-100,\\,0) - 5",
      explain:'Below $100 you simply let it expire and lose only the $5 you paid. Above $105 you are in profit, and the upside keeps climbing. Limited loss, open-ended gain.',
      update:function(v,root){var prof=Math.max(v.s-100,0)-5;
        q(root,'ans').textContent=(prof>=0?'+':'')+money(prof); var c=q(root,'chip'); c.className='chip '+(prof>=0?'good':'lost'); c.textContent=prof>=0?'in profit':'lost the premium';
        q(root,'note').textContent='at a '+money(v.s)+' stock price, the call profits '+(prof>=0?'+':'')+money(prof);
        var x0=40,x1=300,yz=110,k=100,prem=5, sx=function(s){return x0+((s-50)/100)*(x1-x0);}, py=function(p){return yz-p*2.2;};
        var g='<line x1="'+x0+'" y1="'+yz+'" x2="'+x1+'" y2="'+yz+'" stroke="var(--border)"/>';
        g+='<polyline points="'+sx(50)+','+py(-5)+' '+sx(100)+','+py(-5)+' '+sx(150)+','+py(45)+'" fill="none" stroke="var(--accent)" stroke-width="2"/>';
        g+='<line x1="'+sx(105)+'" y1="14" x2="'+sx(105)+'" y2="160" stroke="var(--faint)" stroke-dasharray="2 3"/>';
        g+='<circle cx="'+sx(v.s)+'" cy="'+py(prof)+'" r="5" fill="'+(prof>=0?'var(--good)':'var(--lost)')+'"/>';
        g+='<text x="'+(sx(105)+4)+'" y="24" font-size="10" fill="var(--faint)">break even $105</text>';
        g+='<text x="'+x0+'" y="135" font-size="10" fill="var(--faint)">$50</text><text x="'+x1+'" y="135" font-size="10" fill="var(--faint)" text-anchor="end">$150</text>';
        q(root,'svg').innerHTML=g;
        K(q(root,'fnum'),'\\max('+v.s+'-100,0) - 5 = '+(prof>=0?'+':'')+prof);}},

    putcall:{ch:'H4 · derivatives',eyebrow:'put-call parity',idea:'A call, a put, the stock and a bond are tied by one equation.',
      usecase:"Spotting a free lunch in option prices. If a call minus a put does not equal the stock minus the discounted strike, the prices are out of line and someone can arbitrage.",
      fixed:"stock $100, strike $100, 5% rate, 1 year", src:'Berk-DeMarzo Ch.21',
      inputs:[{k:'call',label:'price of the call',min:1,max:20,step:0.5,val:8,unit:'$'},{k:'put',label:'price of the put',min:1,max:20,step:0.5,val:6,unit:'$'}],
      viz:hbar('lhs','var(--accent)','call minus put')+hbar('rhs','var(--good)','stock minus discounted strike'),
      fgen:"C - P \\;=\\; S - \\dfrac{K}{(1+r)^{T}}",
      explain:'The two sides must match. If call minus put is bigger, the call is dear: sell it, buy the put and the stock, and pocket the difference risk-free.',
      update:function(v,root){var lhs=v.call-v.put, rhs=100-100/1.05, gap=lhs-rhs, mx=Math.max(Math.abs(lhs),Math.abs(rhs),1);
        q(root,'ans').textContent=Math.abs(gap)<0.4?'in line':'mispriced by '+money(Math.abs(gap)); var c=q(root,'chip'); c.className='chip '+(Math.abs(gap)<0.4?'good':'lost'); c.textContent=Math.abs(gap)<0.4?'no free lunch':'arbitrage';
        q(root,'note').textContent='call minus put is '+money(lhs)+', it should equal '+money(rhs);
        q(root,'lhsval').textContent=money(lhs); q(root,'rhsval').textContent=money(rhs);
        q(root,'lhsbar').style.width=(Math.abs(lhs)/mx*100)+'%'; q(root,'rhsbar').style.width=(Math.abs(rhs)/mx*100)+'%';
        K(q(root,'fnum'),'('+v.call+'-'+v.put+') = '+lhs.toFixed(2)+' \\text{ vs } '+rhs.toFixed(2));}},

    binomial:{ch:'H4 · derivatives',eyebrow:'binomial model',idea:'Price an option from its next up or down move.',
      usecase:"Valuing an option step by step, by what it pays if the stock goes up versus down. It is the simplest engine behind modern option pricing.",
      fixed:"stock $100, strike $100, 5% rate, one step", src:'Berk-DeMarzo Ch.21',
      inputs:[{k:'up',label:'how far the stock could rise',min:5,max:50,step:5,val:20,unit:'%'},{k:'dn',label:'how far the stock could fall',min:5,max:40,step:5,val:15,unit:'%'}],
      viz:'<div style="display:flex;align-items:center;justify-content:center;gap:30px;height:130px;font-size:13px;"><div style="text-align:center;"><div style="font-weight:600;font-size:16px;">$100</div><div class="explain" style="margin:2px 0 0;">today</div></div><div style="display:flex;flex-direction:column;gap:34px;"><div>up to <b data-r="su"></b> &middot; <span style="color:var(--good);">call <b data-r="cu"></b></span></div><div>down to <b data-r="sd"></b> &middot; <span style="color:var(--lost);">call <b data-r="cd"></b></span></div></div></div>',
      fgen:"\\text{value} \\;=\\; \\dfrac{p\\,C_{up} + (1-p)\\,C_{down}}{1+r}",
      explain:'Weigh the up and down payoffs by their risk-neutral chances, then discount. No guessing the real odds is needed, which is the clever part.',
      update:function(v,root){var u=1+v.up/100, d=1-v.dn/100, Su=100*u, Sd=100*d, Cu=Math.max(Su-100,0), Cd=Math.max(Sd-100,0), r=0.05, p=(1+r-d)/(u-d), val=(p*Cu+(1-p)*Cd)/(1+r);
        q(root,'ans').textContent=money(val); var c=q(root,'chip'); c.className='chip info'; c.textContent='value of the call';
        q(root,'note').textContent='balancing a '+money(Su)+' up case and a '+money(Sd)+' down case, the call is worth '+money(val);
        q(root,'su').textContent=money(Su); q(root,'sd').textContent=money(Sd); q(root,'cu').textContent=money(Cu); q(root,'cd').textContent=money(Cd);
        K(q(root,'fnum'),'('+p.toFixed(2)+'\\times'+Cu.toFixed(0)+' + '+(1-p).toFixed(2)+'\\times'+Cd.toFixed(0)+')/1.05 = '+val.toFixed(2));}},

    bs:{ch:'H4 · derivatives',eyebrow:'Black-Scholes',idea:'Price an option from volatility and time.',
      usecase:"Putting a number on an option the way markets do. The value is driven mostly by how volatile the stock is and how long until expiry: more of either, more value.",
      fixed:"stock $100, strike $100, 5% rate", src:'Berk-DeMarzo Ch.21',
      inputs:[{k:'vol',label:'how volatile the stock is',min:10,max:60,step:5,val:30,unit:'%',lo:'calm',hi:'wild'},{k:'t',label:'years until it expires',min:0.25,max:3,step:0.25,val:1,unit:'yr'}],
      viz:hbar('cv','var(--accent)','what the option is worth'),
      fgen:"C \\;=\\; S\\,N(d_1) - K\\,e^{-rT}N(d_2)",
      explain:'With no move expected on average, the option still has value because the stock might swing your way. The wilder the stock and the longer the wait, the more that chance is worth.',
      update:function(v,root){function Ncdf(x){var t=1/(1+0.2316419*Math.abs(x)),d=0.3989423*Math.exp(-x*x/2),p=d*t*(0.3193815+t*(-0.3565638+t*(1.781478+t*(-1.821256+t*1.330274))));return x>0?1-p:p;}
        var S=100,K=100,r=0.05,sig=v.vol/100,T=v.t, d1=((r+sig*sig/2)*T)/(sig*Math.sqrt(T)), d2=d1-sig*Math.sqrt(T), call=S*Ncdf(d1)-K*Math.exp(-r*T)*Ncdf(d2);
        q(root,'ans').textContent=money(call); var c=q(root,'chip'); c.className='chip info'; c.textContent='fair value of the call';
        q(root,'note').textContent='at '+v.vol+'% volatility over '+v.t+(v.t===1?' year':' years')+', the call is worth '+money(call);
        q(root,'cvval').textContent=money(call); q(root,'cvbar').style.width=Math.min(call/40*100,100)+'%';
        K(q(root,'fnum'),'C = 100\\,N('+d1.toFixed(2)+') - 100e^{-0.05\\cdot'+T+'}N('+d2.toFixed(2)+') = '+call.toFixed(2));}}
,

    growann:{ch:'H1 · discounting',eyebrow:'growing payments',idea:'Payments that grow each year, for a set number of years.',
      usecase:"Valuing a salary, a pension, or a savings plan where the amount rises each year, say with raises or inflation, but stops after a set number of years.",
      fixed:"a $1,000 first payment, 5% rate", src:'Berk-DeMarzo Ch.4 · test_epfl_exam2.py',
      inputs:[{k:'g',label:'how fast each payment grows',min:0,max:4,step:0.5,val:3,unit:'%'},{k:'n',label:'number of years',min:1,max:30,step:1,val:15,unit:'yr'}],
      viz:'<div data-r="bars" style="display:flex;align-items:flex-end;gap:4px;height:104px;justify-content:center;"></div><div class="explain" style="text-align:center;" data-r="sumnote"></div>',
      fgen:"PV \\;=\\; \\dfrac{C}{r-g}\\left(1-\\left(\\dfrac{1+g}{1+r}\\right)^{n}\\right)",
      explain:'Each payment is bigger than the last but still discounted back to today. Growth lifts the value, and the closer growth gets to your rate, the more it climbs.',
      update:function(v,root){var r=0.05,g=v.g/100,c0=1000, gaf=(1/(r-g))*(1-Math.pow((1+g)/(1+r),v.n)), pv=c0*gaf;
        q(root,'ans').textContent=money(pv); var c=q(root,'chip'); c.className='chip info'; c.textContent='grows '+v.g+'% a year';
        q(root,'note').textContent='a $1,000 payment growing '+v.g+'% a year for '+v.n+' years is worth '+money(pv)+' today';
        var shown=Math.min(v.n,16), bars='';
        for(var t=0;t<shown;t++){var pvt=c0*Math.pow(1+g,t)/Math.pow(1+r,t+1), h=Math.max(4,pvt/1000*84); bars+='<div style="width:'+(shown>12?9:13)+'px;height:'+h+'px;background:var(--accent);border-radius:3px;"></div>';}
        q(root,'bars').innerHTML=bars;
        q(root,'sumnote').textContent='each growing payment, discounted to today, then summed';
        K(q(root,'fnum'),'\\dfrac{1000}{'+(r-g).toFixed(3)+'}(1-('+((1+g)/(1+r)).toFixed(3)+')^{'+v.n+'}) = '+Math.round(pv));}},

    contcomp:{ch:'H1 · rates',eyebrow:'continuous compounding',idea:'Compounded every instant, money grows a little faster still.',
      usecase:"Comparing a rate that compounds continuously, common in finance and option pricing, with a plain once-a-year rate. The gap is small but real.",
      fixed:"starting from $100", src:'Berk-DeMarzo Ch.5',
      inputs:[{k:'r',label:'the yearly rate',min:1,max:12,step:0.5,val:5,unit:'%'},{k:'t',label:'years it grows',min:1,max:20,step:1,val:10,unit:'yr'}],
      viz:twoBarHTML('compounded yearly','compounded continuously'),
      fgen:"\\text{future} \\;=\\; \\text{today}\\times e^{\\,r\\,t}",
      explain:'Adding interest more and more often nudges the total up. Doing it every instant is the limit, using the number e, and gives the most growth for the same rate.',
      update:function(v,root){var yr=100*Math.pow(1+v.r/100,v.t), cont=100*Math.exp(v.r/100*v.t), mx=cont;
        q(root,'ans').textContent=money(cont); var c=q(root,'chip'); c.className='chip good'; c.textContent='+'+money(cont-yr)+' vs yearly';
        q(root,'note').textContent='$100 at '+v.r+'% over '+v.t+(v.t===1?' year':' years')+' grows to '+money(cont)+' compounded continuously';
        q(root,'av').textContent=money(yr); q(root,'bv').textContent=money(cont);
        q(root,'abar').style.height=(yr/mx*144)+'px'; q(root,'bbar').style.height='144px';
        K(q(root,'fnum'),'100\\times e^{'+(v.r/100).toFixed(3)+'\\cdot'+v.t+'} = '+cont.toFixed(2));}},

    cml:{ch:'H2 · risk & return',eyebrow:'capital market line',idea:'Mixing the market with cash gives the best deals available.',
      usecase:"Deciding how much to hold in a broad market fund versus safe cash. Every blend sits on one straight line, and that line is the best return for each level of risk.",
      fixed:"market: 8% return, 16% swing; safe rate 3%", src:'Berk-DeMarzo Ch.11',
      inputs:[{k:'x',label:'share you put in the market',min:0,max:150,step:5,val:60,unit:'%',lo:'all safe',hi:'borrow to buy more'}],
      viz:'<svg data-r="svg" viewBox="0 0 320 170" width="100%" style="max-width:340px;display:block;margin:0 auto;"></svg>',
      fgen:"\\text{return} \\;=\\; r_f + \\text{share}\\times(r_M - r_f)",
      explain:'Hold some cash to sit safely below the market; borrow to push past it for more return and more risk. Either way you stay on the same straight line.',
      update:function(v,root){var rf=3,rm=8,vm=16,x=v.x/100, ret=rf+x*(rm-rf), vol=x*vm;
        q(root,'ans').textContent=ret.toFixed(1)+'%'; var c=q(root,'chip'); c.className='chip info'; c.textContent='at '+vol.toFixed(1)+'% risk';
        q(root,'note').textContent=v.x+'% in the market gives a '+ret.toFixed(1)+'% return at a '+vol.toFixed(1)+'% swing';
        var x0=42,x1=300,y0=148,y1=16, vx=function(s){return x0+(s/26)*(x1-x0);}, ry=function(r){return y0-(r/14)*(y0-y1);};
        var g='<line x1="'+x0+'" y1="'+y0+'" x2="'+x1+'" y2="'+y0+'" stroke="var(--border)"/><line x1="'+x0+'" y1="'+y0+'" x2="'+x0+'" y2="'+y1+'" stroke="var(--border)"/>';
        g+='<line x1="'+vx(0)+'" y1="'+ry(rf)+'" x2="'+vx(24)+'" y2="'+ry(rf+(24/vm)*(rm-rf))+'" stroke="var(--accent)" stroke-width="2"/>';
        g+='<circle cx="'+vx(16)+'" cy="'+ry(rm)+'" r="3" fill="var(--faint)"/>';
        g+='<circle cx="'+vx(Math.min(vol,26))+'" cy="'+ry(Math.min(ret,14))+'" r="5" fill="var(--accent)"/>';
        g+='<text x="6" y="'+y1+'" font-size="10" fill="var(--faint)">return</text><text x="'+x1+'" y="164" font-size="10" fill="var(--faint)" text-anchor="end">risk</text>';
        g+='<text x="'+vx(16)+'" y="'+(ry(rm)-8)+'" font-size="9" fill="var(--faint)" text-anchor="middle">market</text>';
        q(root,'svg').innerHTML=g;
        K(q(root,'fnum'),'3 + '+x.toFixed(2)+'\\times(8-3) = '+ret.toFixed(1)+'\\%');}},

    portbeta:{ch:'H2 · risk & return',eyebrow:'portfolio beta',idea:'A portfolio’s beta is the average of its parts.',
      usecase:"Gauging how your whole portfolio will move with the market by blending the betas of what you hold, weighted by how much of each you own.",
      fixed:"a calm stock (beta 0.5) and a wild one (beta 1.25)", src:'Berk-DeMarzo Ch.12 · test_epfl_exam2.py',
      inputs:[{k:'w',label:'share in the calm stock',min:0,max:100,step:5,val:50,unit:'%'}],
      viz:hbar('pb','var(--accent)','how your whole portfolio moves with the market'),
      fgen:"\\beta_{\\text{portfolio}} \\;=\\; \\textstyle\\sum w_i\\,\\beta_i",
      explain:'No need for anything fancy: weight each holding beta by its share and add them up. More in the calm stock pulls the whole portfolio steadier.',
      update:function(v,root){var w=v.w/100, pb=w*0.5+(1-w)*1.25;
        q(root,'ans').textContent=pb.toFixed(2); var c=q(root,'chip'); c.className='chip info'; c.textContent=pb<0.97?'calmer than the market':pb>1.03?'wilder than the market':'moves with the market';
        q(root,'note').textContent='your portfolio swings about '+pb.toFixed(2)+' times as hard as the market';
        q(root,'pbval').textContent=pb.toFixed(2); q(root,'pbbar').style.width=Math.min(pb/2.5*100,100)+'%';
        K(q(root,'fnum'),w.toFixed(2)+'\\times 0.5 + '+(1-w).toFixed(2)+'\\times 1.25 = '+pb.toFixed(2));}},

    mm2:{ch:'H3 · financing',eyebrow:'MM II',idea:'More debt makes shareholders demand a higher return.',
      usecase:"Understanding why a company cost of equity rises as it borrows more. The shrinking slice of equity bears more of the swings, so owners ask for more.",
      fixed:"the business earns 9%, debt costs 5%", src:'Berk-DeMarzo Ch.14',
      inputs:[{k:'dv',label:'share funded by debt',min:0,max:75,step:5,val:40,unit:'%'}],
      viz:twoBarHTML('the business return','what equity now demands'),
      fgen:"r_E \\;=\\; r_A + \\tfrac{D}{E}\\,(r_A - r_D)",
      explain:'Total value does not change, but the risk is squeezed onto a smaller equity base, so the return shareholders require climbs with every bit of debt.',
      update:function(v,root){var dv=v.dv/100, de=dv/(1-dv), rE=9+de*(9-5), mx=Math.max(9,rE);
        q(root,'ans').textContent=rE.toFixed(1)+'%'; var c=q(root,'chip'); c.className='chip info'; c.textContent='cost of equity';
        q(root,'note').textContent='at '+v.dv+'% debt, equity holders now demand '+rE.toFixed(1)+'% instead of 9%';
        q(root,'av').textContent='9.0%'; q(root,'bv').textContent=rE.toFixed(1)+'%';
        q(root,'abar').style.height=(9/mx*144)+'px'; q(root,'bbar').style.height='144px';
        K(q(root,'fnum'),'9 + '+de.toFixed(2)+'\\times(9-5) = '+rE.toFixed(1)+'\\%');}}
  };

  var CHAPTERS=[
    {id:'H1',title:'Discounting & valuation',sub:'what a future dollar is worth today',
     cards:[{id:'pv',t:'Present value',r:1},{id:'fv',t:'Future value',r:1},{id:'perpetuity',t:'Perpetuity',r:1},{id:'annuity',t:'Annuity',r:1},{id:'growann',t:'Growing annuity',r:1},{id:'npv',t:'NPV: is it worth it?',r:1},
            {id:'pi',t:'Profitability index',r:1},{id:'ear',t:'EAR vs APR',r:1},{id:'loan',t:'Loan & amortization',r:1},{id:'contcomp',t:'Continuous compounding',r:1},{id:'spot',t:'Spot rates',r:1},{id:'forward',t:'Forward rates',r:1},{id:'bond',t:'Bond pricing',r:1},{id:'ytm',t:'Yield to maturity',r:1},{id:'duration',t:'Duration',r:1},{id:'ddm',t:'Dividend-discount',r:1}]},
    {id:'H2',title:'Risk & return',sub:'how much you should be paid for risk',
     cards:[{id:'diversification',t:'Diversification',r:1},{id:'capm',t:'CAPM: return to ask for',r:1},
            {id:'expvar',t:'Expected return & volatility',r:1},{id:'covcorr',t:'Covariance & correlation',r:1},{id:'portvar',t:'Portfolio variance',r:1},{id:'riskcontrib',t:'Risk contribution',r:1},{id:'minvar',t:'Minimum-variance',r:1},{id:'frontier',t:'Efficient frontier',r:1},{id:'cml',t:'Capital market line',r:1},{id:'sharpe',t:'Sharpe ratio',r:1},{id:'beta',t:'Beta',r:1},{id:'portbeta',t:'Portfolio beta',r:1},{id:'sysidio',t:'Systematic vs idiosyncratic',r:1},{id:'alpha',t:'Alpha',r:1}]},
    {id:'H3',title:'Capital budgeting & financing',sub:'judging companies and how they pay for themselves',
     cards:[{id:'wacc',t:'WACC',r:1},
            {id:'fcf',t:'Free cash flow',r:1},{id:'nwc',t:'Net working capital',r:1},{id:'npvirr',t:'NPV vs IRR',r:1},{id:'dcf',t:'DCF / enterprise value',r:1},{id:'terminal',t:'Terminal value',r:1},{id:'hamada',t:'Unlever / relever beta',r:1},{id:'mm',t:'Modigliani-Miller',r:1},{id:'mm2',t:'MM II: cost of equity',r:1},{id:'apv',t:'APV',r:1},{id:'taxshield',t:'Tax shield',r:1},{id:'distress',t:'Distress costs',r:1}]},
    {id:'H4',title:'Derivatives',sub:'moving and pricing risk',
     cards:[{id:'fwdfut',t:'Forward vs futures',r:1},{id:'fwdprice',t:'Forward pricing',r:1},{id:'swap',t:'Swaps',r:1},{id:'optpayoff',t:'Option payoffs',r:1},{id:'putcall',t:'Put-call parity',r:1},{id:'binomial',t:'Binomial model',r:1},{id:'bs',t:'Black-Scholes',r:1}]}
  ];

  function renderHome(){
    var ready=0,total=0;
    CHAPTERS.forEach(function(c){c.cards.forEach(function(k){total++; if(k.r)ready++;});});
    var h='<div class="top"><span class="bname">OpenQuant</span><span class="pill">'+ready+' of '+total+' cards live</span></div>'
      +'<p class="lede">Finance, one card at a time. The EPFL <i>Principles of Finance</i> course as a deck of cards. Each one has one idea, one picture, and one formula, on numbers you can move. Tap any concept.</p>';
    CHAPTERS.forEach(function(c){
      h+='<div class="chap"><h2>'+c.id+' · '+c.title+'</h2><div class="cs">'+c.sub+'</div><div class="grid">';
      c.cards.forEach(function(k){
        if(k.r) h+='<a class="tile" href="#/c/'+k.id+'"><div class="tt">'+k.t+'</div><div class="ts"><span class="ddot"></span>open</div></a>';
        else h+='<div class="tile soon"><div class="tt">'+k.t+'</div><div class="ts"><span class="ddot s"></span>soon</div></div>';
      });
      h+='</div></div>';
    });
    app.innerHTML=h; window.scrollTo(0,0);
  }

  function renderCard(id){
    var c=CARDS[id]; if(!c){location.hash='#/';return;}
    var inp=c.inputs.map(function(i){return '<div class="ctrl"><div class="row"><span>'+i.label+'</span><b data-rk="'+i.k+'"></b></div><input type="range" data-key="'+i.k+'" min="'+i.min+'" max="'+i.max+'" step="'+i.step+'" value="'+i.val+'">'+((i.lo||i.hi)?'<div class="sanchor"><span>'+(i.lo||'')+'</span><span>'+(i.hi||'')+'</span></div>':'')+'</div>';}).join('');
    app.innerHTML='<div class="crumb"><span class="back" onclick="location.hash=\'#/\'">← all concepts</span><span class="ch">'+c.ch+'</span></div>'
      +'<div class="card"><div class="eyebrow">'+c.eyebrow+'</div><h1>'+c.idea+'</h1>'
      +'<div class="usecase">'+c.usecase+'</div>'
      +'<div class="hero"><span class="big" data-r="ans"></span><span data-r="chip"></span></div><p class="heronote" data-r="note"></p>'
      +'<div class="viz">'+c.viz+'</div>'
      +'<div class="ctrls">'+inp+'</div>'
      +(c.fixed?'<div class="fixed">'+c.fixed+'</div>':'')
      +'<p class="explain">'+c.explain+'</p>'
      +'<div class="formula"><div class="gen" data-r="fgen"></div><div class="num" data-r="fnum"></div></div>'
      +'<p class="src">'+c.src+'</p></div>';
    var root=app;
    K(q(root,'fgen'),c.fgen);
    function recompute(){
      var v={}; c.inputs.forEach(function(i){var el=root.querySelector('[data-key="'+i.k+'"]'),val=+el.value; v[i.k]=val;
        var disp=i.fmt?i.fmt(val):(i.unit==='$'?money(val):i.unit==='%'?val+'%':i.unit==='yr'?val+(val===1?' yr':' yrs'):val);
        root.querySelector('[data-rk="'+i.k+'"]').textContent=disp;});
      c.update(v,root);
    }
    root.querySelectorAll('input[type=range]').forEach(function(el){el.addEventListener('input',recompute);});
    recompute(); window.scrollTo(0,0);
  }

  function route(){var h=location.hash||'#/'; var m=h.match(/^#\/c\/(.+)$/); if(m) renderCard(m[1]); else renderHome();}
  window.addEventListener('hashchange',route);
  if(window.katex) route(); else window.addEventListener('load',route);
})();
</script>
