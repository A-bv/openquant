name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  parity:
    name: Browser math == engine math
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install the engine package and pytest
        run: pip install pytest "openquant-engine @ git+https://github.com/A-bv/openquant-engine"

      - name: Run the parity suite (site/finance.js vs the engine)
        run: python -m pytest -q tests/
