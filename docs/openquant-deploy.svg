<svg viewBox="0 0 860 320" xmlns="http://www.w3.org/2000/svg" font-family="Inter, -apple-system, system-ui, sans-serif" role="img" aria-label="OpenQuant deployment">
  <title>OpenQuant — deployment (3 targets)</title>
  <desc>Pushing to GitHub auto-deploys the React app to Vercel and the API to Render; Vercel proxies /api/* to Render. The teaching deck is published manually to GitHub Pages.</desc>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#9b9a90"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="860" height="320" rx="14" fill="#fbfaf7"/>

  <!-- auto section -->
  <text x="30" y="30" font-size="11" font-weight="700" letter-spacing="0.05em" fill="#1f9d6b">PUSH TO GITHUB &#8594; AUTO-DEPLOYS</text>

  <rect x="30" y="58" width="120" height="56" rx="9" fill="#fff" stroke="#dedcd3"/>
  <text x="90" y="82" text-anchor="middle" font-size="13" font-weight="700" fill="#20201d">git push</text>
  <text x="90" y="99" text-anchor="middle" font-size="10.5" fill="#6b6a62">to GitHub</text>

  <g stroke="#bdbcb2" stroke-width="1.6" fill="none" marker-end="url(#arr)">
    <path d="M150,80 C200,70 215,66 248,64"/>
    <path d="M150,92 C200,118 215,142 248,144"/>
  </g>

  <rect x="250" y="40" width="250" height="50" rx="9" fill="#fff" stroke="#dedcd3"/>
  <text x="266" y="62" font-size="13" font-weight="600" fill="#20201d">Vercel — React app</text>
  <text x="266" y="79" font-size="10.5" fill="#1f9d6b">auto on push</text>

  <rect x="250" y="120" width="250" height="50" rx="9" fill="#fff" stroke="#dedcd3"/>
  <text x="266" y="142" font-size="13" font-weight="600" fill="#20201d">Render — FastAPI API</text>
  <text x="266" y="159" font-size="10.5" fill="#1f9d6b">auto on push</text>

  <!-- vercel proxies to render -->
  <line x1="375" y1="90" x2="375" y2="120" stroke="#bdbcb2" stroke-width="1.6" marker-end="url(#arr)"/>
  <text x="388" y="109" font-size="10.5" fill="#6b6a62">proxies /api/*</text>

  <rect x="560" y="70" width="270" height="50" rx="9" fill="#f4f3ee" stroke="#dedcd3"/>
  <text x="575" y="92" font-size="12" fill="#20201d">live app at your Vercel URL;</text>
  <text x="575" y="108" font-size="11" fill="#6b6a62">API at openquant-api.onrender.com</text>

  <!-- divider -->
  <line x1="30" y1="196" x2="830" y2="196" stroke="#e6e4dc" stroke-width="1"/>

  <!-- manual section -->
  <text x="30" y="224" font-size="11" font-weight="700" letter-spacing="0.05em" fill="#d98a2b">TEACHING DECK &#8594; MANUAL (NO CI)</text>

  <rect x="30" y="244" width="180" height="50" rx="9" fill="#fff" stroke="#dedcd3"/>
  <text x="120" y="266" text-anchor="middle" font-size="12.5" font-weight="600" fill="#20201d">companion.html</text>
  <text x="120" y="282" text-anchor="middle" font-size="10" fill="#6b6a62">frontend/public/</text>

  <rect x="270" y="244" width="180" height="50" rx="9" fill="#fff" stroke="#dedcd3"/>
  <text x="360" y="266" text-anchor="middle" font-size="12.5" font-weight="600" fill="#20201d">gh-pages branch</text>
  <text x="360" y="282" text-anchor="middle" font-size="10" fill="#6b6a62">copied as index.html</text>

  <rect x="510" y="244" width="320" height="50" rx="9" fill="#fff" stroke="#dedcd3"/>
  <text x="525" y="266" font-size="12.5" font-weight="600" fill="#20201d">GitHub Pages</text>
  <text x="525" y="282" font-size="10.5" fill="#6b6a62">a-bv.github.io/openquant</text>

  <g stroke="#bdbcb2" stroke-width="1.6" fill="none" marker-end="url(#arr)">
    <line x1="210" y1="269" x2="268" y2="269"/>
    <line x1="450" y1="269" x2="508" y2="269"/>
  </g>
</svg>
