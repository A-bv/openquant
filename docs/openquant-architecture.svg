<svg viewBox="0 0 960 400" xmlns="http://www.w3.org/2000/svg" font-family="Inter, -apple-system, system-ui, sans-serif" role="img" aria-label="OpenQuant architecture">
  <title>OpenQuant architecture</title>
  <desc>Data sources feed the pure-Python core engine, exposed by FastAPI routers, rendered by the React app. The teaching deck is standalone.</desc>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#9b9a90"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="960" height="400" rx="14" fill="#fbfaf7"/>

  <g fill="#8a897f" font-size="11" font-weight="600" letter-spacing="0.06em" text-anchor="middle">
    <text x="82" y="44">DATA (FREE)</text>
    <text x="224" y="44">FETCH</text>
    <text x="400" y="44">core/ ENGINE</text>
    <text x="618" y="44">api/ (FastAPI)</text>
    <text x="836" y="44">frontend/</text>
  </g>

  <g stroke="#bdbcb2" stroke-width="1.6" fill="none" marker-end="url(#arr)">
    <path d="M140,112 L166,138"/>
    <path d="M140,174 L166,148"/>
    <path d="M280,138 L310,114"/>
    <path d="M280,150 L310,172"/>
    <line x1="488" y1="112" x2="518" y2="112"/>
    <line x1="488" y1="174" x2="518" y2="174"/>
    <line x1="488" y1="260" x2="518" y2="260"/>
    <path d="M716,112 L746,166"/>
    <line x1="716" y1="174" x2="746" y2="174"/>
    <path d="M716,260 L746,182"/>
  </g>

  <g>
    <g><rect x="24" y="88" width="116" height="48" rx="9" fill="#fff" stroke="#dedcd3"/>
      <text x="82" y="108" text-anchor="middle" font-size="13" font-weight="600" fill="#20201d">SEC EDGAR</text>
      <text x="82" y="124" text-anchor="middle" font-size="10.5" fill="#6b6a62">financials</text></g>
    <g><rect x="24" y="150" width="116" height="48" rx="9" fill="#fff" stroke="#dedcd3"/>
      <text x="82" y="170" text-anchor="middle" font-size="13" font-weight="600" fill="#20201d">yfinance</text>
      <text x="82" y="186" text-anchor="middle" font-size="10.5" fill="#6b6a62">prices</text></g>

    <g><rect x="168" y="119" width="112" height="48" rx="9" fill="#fff" stroke="#dedcd3"/>
      <text x="224" y="139" text-anchor="middle" font-size="13" font-weight="600" fill="#20201d">core/data</text>
      <text x="224" y="155" text-anchor="middle" font-size="10.5" fill="#6b6a62">fetch &amp; clean</text></g>

    <g><rect x="312" y="88" width="176" height="48" rx="9" fill="#eef3fd" stroke="#2f6fe0" stroke-width="1.4"/>
      <text x="400" y="108" text-anchor="middle" font-size="13" font-weight="700" fill="#1b4fb0">core/valuation</text>
      <text x="400" y="124" text-anchor="middle" font-size="10.5" fill="#2f6fe0">reverse-DCF</text></g>
    <g><rect x="312" y="150" width="176" height="48" rx="9" fill="#fff" stroke="#dedcd3"/>
      <text x="400" y="170" text-anchor="middle" font-size="13" font-weight="600" fill="#20201d">core/portfolio</text>
      <text x="400" y="186" text-anchor="middle" font-size="10.5" fill="#6b6a62">risk &amp; return</text></g>
    <g><rect x="312" y="236" width="176" height="48" rx="9" fill="#fff" stroke="#dedcd3"/>
      <text x="400" y="256" text-anchor="middle" font-size="13" font-weight="600" fill="#20201d">core/money</text>
      <text x="400" y="272" text-anchor="middle" font-size="10.5" fill="#6b6a62">no market data</text></g>

    <g><rect x="520" y="88" width="196" height="48" rx="9" fill="#fff" stroke="#dedcd3"/>
      <text x="618" y="108" text-anchor="middle" font-size="13" font-weight="600" fill="#20201d">routers/stock</text>
      <text x="618" y="124" text-anchor="middle" font-size="10.5" fill="#6b6a62">/analyse · /calibration</text></g>
    <g><rect x="520" y="150" width="196" height="48" rx="9" fill="#fff" stroke="#dedcd3"/>
      <text x="618" y="170" text-anchor="middle" font-size="13" font-weight="600" fill="#20201d">routers/portfolio</text>
      <text x="618" y="186" text-anchor="middle" font-size="10.5" fill="#6b6a62">/diversification</text></g>
    <g><rect x="520" y="236" width="196" height="48" rx="9" fill="#fff" stroke="#dedcd3"/>
      <text x="618" y="256" text-anchor="middle" font-size="13" font-weight="600" fill="#20201d">routers/money</text>
      <text x="618" y="272" text-anchor="middle" font-size="10.5" fill="#6b6a62">/now-or-later</text></g>

    <g><rect x="748" y="150" width="188" height="48" rx="9" fill="#fff" stroke="#dedcd3"/>
      <text x="842" y="170" text-anchor="middle" font-size="13" font-weight="600" fill="#20201d">React app</text>
      <text x="842" y="186" text-anchor="middle" font-size="10.5" fill="#6b6a62">Money · Stock · Portfolio</text></g>
    <g><rect x="748" y="300" width="188" height="48" rx="9" fill="#f4f3ee" stroke="#dedcd3" stroke-dasharray="4 3"/>
      <text x="842" y="320" text-anchor="middle" font-size="13" font-weight="600" fill="#20201d">companion.html</text>
      <text x="842" y="336" text-anchor="middle" font-size="10.5" fill="#6b6a62">teaching deck (standalone)</text></g>
  </g>

  <text x="24" y="378" font-size="11" fill="#8a897f">Read left to right: data to engine (pure Python, EPFL-exam-tested) to API to screen.  The deck plugs into nothing.</text>
</svg>
