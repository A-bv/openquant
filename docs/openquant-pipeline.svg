<svg viewBox="0 0 700 560" xmlns="http://www.w3.org/2000/svg" font-family="Inter, -apple-system, system-ui, sans-serif" role="img" aria-label="Stock lab pipeline">
  <title>OpenQuant — the Stock lab pipeline (/analyse)</title>
  <desc>A ticker runs through ten numbered steps; step 8 is the reverse DCF that solves for the growth the current price assumes. It ends in a verdict plus a backtest reliability check.</desc>
  <rect x="0" y="0" width="700" height="560" rx="14" fill="#fbfaf7"/>

  <!-- rail -->
  <line x1="96" y1="44" x2="96" y2="495" stroke="#dedcd3" stroke-width="2"/>

  <!-- ticker -->
  <rect x="120" y="24" width="300" height="40" rx="9" fill="#f4f3ee" stroke="#dedcd3"/>
  <text x="138" y="49" font-size="13" font-weight="700" fill="#20201d">Ticker (e.g. AAPL)</text>
  <circle cx="96" cy="44" r="7" fill="#9b9a90"/>

  <!-- steps -->
  <g>
    <!-- s1 -->
    <circle cx="96" cy="97" r="14" fill="#fff" stroke="#cfcec5"/><text x="96" y="101" text-anchor="middle" font-size="9.5" font-weight="700" fill="#6b6a62">1-2</text>
    <rect x="120" y="80" width="540" height="34" rx="8" fill="#fff" stroke="#dedcd3"/><text x="140" y="102" font-size="12.5" fill="#20201d">Validate ticker + fetch data (SEC EDGAR + yfinance)</text>
    <!-- s2 -->
    <circle cx="96" cy="139" r="14" fill="#fff" stroke="#cfcec5"/><text x="96" y="143" text-anchor="middle" font-size="10" font-weight="700" fill="#6b6a62">3</text>
    <rect x="120" y="122" width="540" height="34" rx="8" fill="#fff" stroke="#dedcd3"/><text x="140" y="144" font-size="12.5" fill="#20201d">Free cash flow history</text>
    <!-- s3 -->
    <circle cx="96" cy="181" r="14" fill="#fff" stroke="#cfcec5"/><text x="96" y="185" text-anchor="middle" font-size="10" font-weight="700" fill="#6b6a62">4</text>
    <rect x="120" y="164" width="540" height="34" rx="8" fill="#fff" stroke="#dedcd3"/><text x="140" y="186" font-size="12.5" fill="#20201d">Beta &#8594; CAPM &#8594; WACC</text>
    <!-- s4 -->
    <circle cx="96" cy="223" r="14" fill="#fff" stroke="#cfcec5"/><text x="96" y="227" text-anchor="middle" font-size="10" font-weight="700" fill="#6b6a62">5</text>
    <rect x="120" y="206" width="540" height="34" rx="8" fill="#fff" stroke="#dedcd3"/><text x="140" y="228" font-size="12.5" fill="#20201d">Suitability &#8212; is a DCF even fair for this company?</text>
    <!-- s5 -->
    <circle cx="96" cy="265" r="14" fill="#fff" stroke="#cfcec5"/><text x="96" y="269" text-anchor="middle" font-size="9.5" font-weight="700" fill="#6b6a62">6-7</text>
    <rect x="120" y="248" width="540" height="34" rx="8" fill="#fff" stroke="#dedcd3"/><text x="140" y="270" font-size="12.5" fill="#20201d">Net debt, shares, forward DCF</text>
    <!-- s6 KEY -->
    <circle cx="96" cy="307" r="14" fill="#2f6fe0" stroke="#2f6fe0"/><text x="96" y="311" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">8</text>
    <rect x="120" y="290" width="540" height="34" rx="8" fill="#eef3fd" stroke="#2f6fe0" stroke-width="1.4"/>
    <text x="140" y="312" font-size="12.5" font-weight="700" fill="#1b4fb0">REVERSE DCF &#8212; the growth today&#39;s price assumes</text>
    <text x="648" y="312" text-anchor="end" font-size="10.5" font-style="italic" fill="#2f6fe0">the key step</text>
    <!-- s7 -->
    <circle cx="96" cy="349" r="14" fill="#fff" stroke="#cfcec5"/><text x="96" y="353" text-anchor="middle" font-size="9.5" font-weight="700" fill="#6b6a62">8b</text>
    <rect x="120" y="332" width="540" height="34" rx="8" fill="#fff" stroke="#dedcd3"/><text x="140" y="354" font-size="12.5" fill="#20201d">Diagnostic &#183; red flags &#183; audit trail</text>
    <!-- s8 -->
    <circle cx="96" cy="391" r="14" fill="#fff" stroke="#cfcec5"/><text x="96" y="395" text-anchor="middle" font-size="10" font-weight="700" fill="#6b6a62">9</text>
    <rect x="120" y="374" width="540" height="34" rx="8" fill="#fff" stroke="#dedcd3"/><text x="140" y="396" font-size="12.5" fill="#20201d">Sensitivity grid (growth &#215; WACC)</text>
    <!-- s9 -->
    <circle cx="96" cy="433" r="14" fill="#fff" stroke="#cfcec5"/><text x="96" y="437" text-anchor="middle" font-size="10" font-weight="700" fill="#6b6a62">10</text>
    <rect x="120" y="416" width="540" height="34" rx="8" fill="#fff" stroke="#dedcd3"/><text x="140" y="438" font-size="12.5" fill="#20201d">Market multiples cross-check</text>
  </g>

  <!-- verdict -->
  <circle cx="96" cy="495" r="7" fill="#9b9a90"/>
  <rect x="120" y="466" width="540" height="58" rx="9" fill="#fff" stroke="#cfcec5" stroke-width="1.4"/>
  <text x="140" y="491" font-size="13" font-weight="700" fill="#20201d">Verdict: "to justify this price you must believe X"</text>
  <text x="140" y="510" font-size="11" fill="#6b6a62">plus how reliable the model has been in the past &#8212; /calibration</text>
</svg>
