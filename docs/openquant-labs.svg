<svg viewBox="0 0 820 470" xmlns="http://www.w3.org/2000/svg" font-family="Inter, -apple-system, system-ui, sans-serif" role="img" aria-label="OpenQuant labs flow">
  <title>OpenQuant — the three labs</title>
  <desc>The app has three tabs (Money, Stock, Portfolio); each calls one endpoint backed by one core module and returns one plain-English answer. The teaching deck is standalone.</desc>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#9b9a90"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="820" height="470" rx="14" fill="#fbfaf7"/>

  <!-- app -->
  <rect x="310" y="28" width="200" height="46" rx="9" fill="#fff" stroke="#dedcd3"/>
  <text x="410" y="50" text-anchor="middle" font-size="13.5" font-weight="700" fill="#20201d">OpenQuant app</text>
  <text x="410" y="66" text-anchor="middle" font-size="10.5" fill="#6b6a62">3 tabs · opens on Money</text>

  <!-- app -> labs -->
  <g stroke="#bdbcb2" stroke-width="1.6" fill="none" marker-end="url(#arr)">
    <path d="M410,74 C300,98 200,108 152,134"/>
    <line x1="410" y1="74" x2="410" y2="134"/>
    <path d="M410,74 C520,98 620,108 668,134"/>
  </g>

  <!-- lab boxes -->
  <g>
    <rect x="36" y="138" width="224" height="74" rx="9" fill="#fff" stroke="#dedcd3"/>
    <text x="148" y="164" text-anchor="middle" font-size="13.5" font-weight="700" fill="#20201d">Money — H1</text>
    <text x="148" y="183" text-anchor="middle" font-size="11.5" fill="#3a3934">/now-or-later</text>
    <text x="148" y="201" text-anchor="middle" font-size="10.5" fill="#6b6a62">core/money</text>

    <rect x="298" y="138" width="224" height="74" rx="9" fill="#eef3fd" stroke="#2f6fe0" stroke-width="1.4"/>
    <text x="410" y="164" text-anchor="middle" font-size="13.5" font-weight="700" fill="#1b4fb0">Stock — H3</text>
    <text x="410" y="183" text-anchor="middle" font-size="11.5" fill="#2f6fe0">/analyse · reverse-DCF</text>
    <text x="410" y="201" text-anchor="middle" font-size="10.5" fill="#5b7cc0">core/valuation</text>

    <rect x="560" y="138" width="224" height="74" rx="9" fill="#fff" stroke="#dedcd3"/>
    <text x="672" y="164" text-anchor="middle" font-size="13.5" font-weight="700" fill="#20201d">Portfolio — H2</text>
    <text x="672" y="183" text-anchor="middle" font-size="11.5" fill="#3a3934">/diversification</text>
    <text x="672" y="201" text-anchor="middle" font-size="10.5" fill="#6b6a62">core/portfolio</text>
  </g>

  <!-- labs -> answer -->
  <g stroke="#bdbcb2" stroke-width="1.6" fill="none" marker-end="url(#arr)">
    <path d="M148,212 C148,250 260,262 322,286"/>
    <line x1="410" y1="212" x2="410" y2="286"/>
    <path d="M672,212 C672,250 560,262 498,286"/>
  </g>

  <!-- answer -->
  <rect x="210" y="288" width="400" height="58" rx="9" fill="#fff" stroke="#dedcd3"/>
  <text x="410" y="313" text-anchor="middle" font-size="13" font-weight="600" fill="#20201d">one plain-English answer + its honest limit</text>
  <text x="410" y="331" text-anchor="middle" font-size="11" fill="#6b6a62">Layer 1 = the result · Layer 2 = the depth, on demand</text>

  <!-- deck -->
  <rect x="210" y="392" width="400" height="52" rx="9" fill="#f4f3ee" stroke="#dedcd3" stroke-dasharray="4 3"/>
  <text x="410" y="415" text-anchor="middle" font-size="13" font-weight="600" fill="#20201d">Teaching deck — companion.html</text>
  <text x="410" y="432" text-anchor="middle" font-size="10.5" fill="#6b6a62">51 interactive cards · standalone (no API)</text>
</svg>
